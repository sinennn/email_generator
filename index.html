<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Client Webmail Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --text: #0f172a;
            --subtext: #64748b;
            --border: #e2e8f0;
            --white: #ffffff;
            --danger: #dc2626;
            --muted: #475569;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 16px -2px rgb(0 0 0 / 0.1);
            --shadow-sm: 0 2px 6px rgb(0 0 0 / 0.05);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
                     env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
        }

        /* ── Layout ── */
        .page-wrap {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 860px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* ── Views ── */
        .login-box, .mail-box { display: none; }
        .active { display: block; }

        /* ── Login ── */
        .login-box {
            padding: 32px 20px;
        }

        .login-box h2 {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-box p {
            color: var(--subtext);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        label {
            font-weight: 600;
            font-size: 0.875rem;
            display: block;
            margin-bottom: 6px;
            color: var(--text);
        }

        input[type="email"] {
            width: 100%;
            padding: 13px 14px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            color: var(--text);
            background: var(--white);
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="email"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgb(37 99 235 / 0.12);
            outline: none;
        }

        /* ── Buttons ── */
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 13px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1;
            transition: opacity 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            white-space: nowrap;
        }

        button:hover { opacity: 0.88; }
        button:active { transform: scale(0.97); opacity: 0.85; }

        .btn-full { width: 100%; }

        .header {
            padding: 16px 20px;
            border-bottom: 2px solid var(--border);
            background: #f8fafc;
        }

        .header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .header-info h3 {
            font-size: clamp(0.85rem, 3vw, 1.1rem);
            color: var(--primary);
            font-weight: 700;
            word-break: break-all;
        }

        .header-info span {
            font-size: 0.8rem;
            color: var(--subtext);
            display: block;
            margin-top: 4px;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .header-buttons button {
            flex: 1;
            font-size: 0.875rem;
            padding: 10px 12px;
        }

        .mail-list-wrap {
            padding: 16px;
        }

        .mail-item {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            cursor: pointer;
            background: var(--white);
            transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .mail-item:hover {
            border-color: var(--primary);
            background: #f1f5f9;
            box-shadow: var(--shadow-sm);
        }

        .mail-item:active { background: #e8eef7; }

        .mail-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--subtext);
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 4px;
        }

        .mail-from {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }

        .mail-subject {
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 0.975rem;
            line-height: 1.3;
        }

        .mail-intro {
            font-size: 0.855rem;
            color: var(--subtext);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--subtext);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 1000;
            overflow: hidden;
        }

        .modal-content {
            background: var(--white);
            width: calc(100% - 24px);
            max-width: 750px;
            margin: 12px auto;
            border-radius: var(--radius);
            height: calc(100dvh - 24px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 48px -12px rgb(0 0 0 / 0.25);
        }

        .modal-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            background: #f8fafc;
            flex-shrink: 0;
        }

        .modal-header h3 {
            margin: 0;
            flex: 1;
            min-width: 0;
            font-size: clamp(0.85rem, 3vw, 1rem);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }

        .modal-header button {
            width: auto;
            padding: 8px 14px;
            background: var(--muted);
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        iframe {
            width: 100%;
            flex: 1;
            border: none;
            background: var(--white);
            display: block;
        }

        @media (min-width: 600px) {
            .page-wrap {
                padding: 24px 16px;
                justify-content: center;
            }

            .login-box { padding: 40px 36px; }

            .header { padding: 20px 24px; }

            .header-top { flex-wrap: nowrap; align-items: center; }

            .header-buttons { width: auto; }

            .mail-list-wrap { padding: 20px 24px; }

            .mail-item { padding: 16px 18px; }

            .modal-content {
                margin: 20px auto;
                height: calc(100dvh - 40px);
            }

            .modal-header { padding: 16px 24px; }
        }

        @media (min-width: 860px) {
            .page-wrap { padding: 32px 24px; }
        }
    </style>
</head>
<body>

<div class="page-wrap">
    <div class="container">

        <div id="loginView" class="login-box active">
            <h2>Client Mail Access</h2>
            <p>Enter your assigned email address to access your inbox instantly.</p>

            <label for="email">Assigned Email Address</label>
            <input type="email" id="email" placeholder="username@domain.com"
                   required autocomplete="email" inputmode="email">

            <button class="btn-full" id="loginBtn" onclick="handleLogin()">Access Inbox</button>
        </div>

        <div id="inboxView" class="mail-box">
            <div class="header">
                <div class="header-top">
                    <div class="header-info">
                        <h3 id="activeUser">Account</h3>
                        <span>Messages expire automatically after 48 hours</span>
                    </div>
                </div>
                <div class="header-buttons">
                    <button onclick="fetchInbox()" style="background: var(--muted);">🔄 Refresh</button>
                    <button onclick="logout()" style="background: var(--danger);">Exit</button>
                </div>
            </div>
            <div class="mail-list-wrap">
                <div id="mailList">Checking mailbox status...</div>
            </div>
        </div>

    </div>
</div>

<div id="mailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalSubject">Email Body</h3>
            <button onclick="closeModal()">Close</button>
        </div>
        <iframe id="mailFrame" sandbox="allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin"></iframe>
    </div>
</div>

<script>
    const API = window.location.origin + '/api';

    const MASTER_PASSWORD = "YourGlobalPassword123!";

    let token = "";
    let userEmail = "";

    window.addEventListener('DOMContentLoaded', () => {
        restoreSession();
    });

    function saveSession(email, sessionToken) {
        localStorage.setItem('mailToken', sessionToken);
        localStorage.setItem('userEmail', email);
    }

    function restoreSession() {
        const savedToken = localStorage.getItem('mailToken');
        const savedEmail = localStorage.getItem('userEmail');

        if(savedToken && savedEmail) {
            token = savedToken;
            userEmail = savedEmail;
            document.getElementById('activeUser').innerText = savedEmail;
            document.getElementById('loginView').classList.remove('active');
            document.getElementById('inboxView').classList.add('active');
            fetchInbox();
        }
    }

    function clearSession() {
        localStorage.removeItem('mailToken');
        localStorage.removeItem('userEmail');
        token = "";
        userEmail = "";
    }

    async function handleLogin() {
    const address = document.getElementById('email').value.trim();
    if (!address) return alert("Please enter an email address.");

    const btn = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Connecting…';

    try {
        let res = await fetch(`${API}/token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ address: address, password: MASTER_PASSWORD })
        });

        if (!res.ok) {
            const errorData = await res.json().catch(() => ({ error: res.statusText }));
            throw new Error(`Login failed (${res.status}): ${errorData.error || errorData.violations?.[0]?.message || 'Unknown error'}`);
        }

        let data = await res.json();
        token = data.token;
        userEmail = address;

        saveSession(address, token);

        document.getElementById('activeUser').innerText = address;
        document.getElementById('loginView').classList.remove('active');
        document.getElementById('inboxView').classList.add('active');
        fetchInbox();
    } catch (err) {
        alert(err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Access Inbox';
    }
}

    async function fetchInbox() {
        const listDiv = document.getElementById('mailList');
        listDiv.innerHTML = "Checking mailbox status...";
        try {
            let res = await fetch(`${API}/messages`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            let data = await res.json();
            let emails = data['hydra:member'] || [];

            if(!emails.length) {
                listDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        Inbox is currently empty.<br>Waiting for sender…
                    </div>`;
                return;
            }

            listDiv.innerHTML = emails.map(m => `
                <div class="mail-item" onclick="openEmail('${m.id}')">
                    <div class="mail-meta">
                        <span class="mail-from"><b>From:</b> ${escapeHtml(m.from.address)}</span>
                        <span>${new Date(m.createdAt).toLocaleTimeString()}</span>
                    </div>
                    <div class="mail-subject">${escapeHtml(m.subject || '(No Subject)')}</div>
                    <div class="mail-intro">${escapeHtml(m.intro)}</div>
                </div>
            `).join('');
        } catch(err) {
            listDiv.innerHTML = "<span style='color:var(--danger);'>Error fetching emails. Please refresh.</span>";
        }
    }

    async function openEmail(id) {
        try {
            let res = await fetch(`${API}/messages/${id}`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            let fullMail = await res.json();
            document.getElementById('modalSubject').innerText = fullMail.subject || 'Email View';

            const content = fullMail.html ? fullMail.html.join('') : fullMail.text;
            const iframe = document.getElementById('mailFrame');

            document.getElementById('mailModal').style.display = 'block';
            iframe.contentWindow.document.open();
            iframe.contentWindow.document.write(content);
            iframe.contentWindow.document.close();
        } catch(err) {
            alert("Could not fetch email details.");
        }
    }

    function closeModal() { document.getElementById('mailModal').style.display = 'none'; }

    function logout() {
        clearSession();
        document.getElementById('loginView').classList.add('active');
        document.getElementById('inboxView').classList.remove('active');
        document.getElementById('email').value = '';
    }

    function escapeHtml(str) { return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ''; }
</script>
</body>
</html>
